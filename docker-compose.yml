services:
  server:
    image: ghcr.io/minyic7/majiang-server:latest
    build:
      context: ./server-dotnet
      dockerfile: Dockerfile
    ports:
      - "7702:7702"
    environment:
      - PORT=7702
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:7702
    restart: unless-stopped

